[directory]
# Set to false to show the full path, ignoring the repository root
truncate_to_repo = false
repo_root_style = 'red'

[custom.wezterm_connect]
description = "Display wezterm connection status"
command = 'echo "$USER in ⛵ $HOST"'
when = '[[ "$WEZTERM_EXECUTABLE" =~ "wezterm-mux-server" ]]'
format = "[$output]($style) "
style = "bold blue"

[custom.proxy]
description = "Display proxy status"
symbol = "🚀 "
when = '[ -n "$http_proxy" ]'
format = "[$symbol]($style) "
style = "bold yellow"

